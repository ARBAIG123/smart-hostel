<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Hostel | Admin</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="dashboard">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-logo">🏨 Smart Hostel | Admin</div>
      <div class="nav-links">
        <a href="scanner.html" style="color:#4f8ef7;text-decoration:none;font-size:0.95rem;">📷 Scanner</a>
<button class="logout-btn" onclick="logoutUser()">Logout</button>
      </div>
    </nav>

    <!-- Header -->
    <div class="dash-header">
      <h1>⚙️ Admin Control Panel</h1>
      <p>Manage bed availability and reset queue slots</p>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('beds')">🛏️ Manage Beds</button>
      <button class="tab-btn" onclick="showTab('queue')">⏱️ Manage Queue</button>
    </div>

    <!-- Beds Tab -->
    <div id="bedsTab" class="admin-section">
      <div class="slots-grid" id="adminRoomsGrid"></div>
    </div>

    <!-- Queue Tab -->
    <div id="queueTab" class="admin-section" style="display:none;">
      <div style="text-align:center; margin-bottom:1rem;">
        <button class="primary-btn" style="max-width:300px;" onclick="resetAllSlots()">🔄 Reset All Slot Counts</button>
      </div>
      <div class="slots-grid" id="adminSlotsGrid"></div>
    </div>

    <p id="adminMessage" class="message" style="text-align:center;"></p>

  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
