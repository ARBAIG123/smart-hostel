<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Hostel | Bed Vacancy</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="dashboard">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-logo">🏨 Smart Hostel</div>
      <div class="nav-links">
        <span id="welcomeUser"></span>
        <a href="dashboard.html">🍽️ Canteen Queue</a>
        <a href="qr.html">📱 My QR</a>
        <button class="logout-btn" onclick="logoutUser()">Logout</button>
      </div>
    </nav>

    <!-- Header -->
    <div class="dash-header">
      <h1>🛏️ Bed Vacancy</h1>
      <p>Real-time room-wise availability across all floors</p>
    </div>

    <!-- Stat Cards -->
    <div class="stats-row">
      <div class="stat-card blue">
        <div class="stat-label">Total Rooms</div>
        <div class="stat-val blue" id="totalRooms">12</div>
        <div class="stat-sub">Across all floors</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Rooms Available</div>
        <div class="stat-val green" id="availableRooms">0</div>
        <div class="stat-sub">Beds free inside</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Rooms Full</div>
        <div class="stat-val red" id="occupiedRooms">0</div>
        <div class="stat-sub">No beds left</div>
      </div>
    </div>

    <!-- Rooms Grid -->
    <div class="slots-grid" id="roomsGrid"></div>

  </div>

  <script type="module" src="beds.js"></script>
</body>
</html>
